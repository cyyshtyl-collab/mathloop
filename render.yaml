databases:
  - name: mathloop-junior-db
    databaseName: mathloop
    user: mathloop
    plan: starter

services:
  - type: web
    name: mathloop-junior-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mathloop-junior-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_MODE
        value: s3
      - key: MAX_UPLOAD_MB
        value: 10
      - key: AI_MODE
        value: mock
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: S3_REGION
        value: auto
